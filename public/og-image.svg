<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E1A"/>
      <stop offset="100%" style="stop-color:#0F1629"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative glow -->
  <ellipse cx="900" cy="315" rx="400" ry="250" fill="#D4AF37" opacity="0.08"/>

  <!-- Logo container - 200x200 scaled from 32x32 (scale factor 6.25) -->
  <g transform="translate(100, 215)">
    <!-- Gold rounded square background -->
    <rect width="200" height="200" rx="44" fill="url(#goldGradient)"/>
    <!-- Abstract S shape - exact coordinates from Logo.tsx scaled by 6.25 -->
    <path d="M50 100C50 72.3856 72.3856 50 100 50C127.6144 50 150 72.3856 150 100"
          fill="none"
          stroke="#0A0E1A"
          stroke-width="15.625"
          stroke-linecap="round"/>
    <circle cx="100" cy="125" r="25" fill="#0A0E1A"/>
  </g>

  <!-- Company name -->
  <text x="350" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" fill="white">Saheeb</text>

  <!-- Tagline -->
  <text x="350" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#D4AF37">AI-native technology solutions for Oman</text>

  <!-- Website -->
  <text x="350" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.5)">saheeb.com</text>
</svg>
